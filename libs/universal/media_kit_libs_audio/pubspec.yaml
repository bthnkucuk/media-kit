name: media_kit_libs_audio
description: package:media_kit audio (only) playback native libraries for all platforms.
version: 1.0.8
homepage: https://github.com/media-kit/media-kit.git
repository: https://github.com/media-kit/media-kit.git

environment:
  sdk: ">=2.17.0 <4.0.0"
  flutter: ">=3.7.0"

dependencies:
  media_kit_libs_android_audio:
    git:
      url: https://github.com/bthnkucuk/media-kit.git
      path: libs/android/media_kit_libs_android_audio
      ref: main
  media_kit_libs_ios_audio:
    git:
      url: https://github.com/bthnkucuk/media-kit.git
      path: libs/ios/media_kit_libs_ios_audio
      ref: main
  media_kit_libs_windows_audio:
    git:
      url: https://github.com/bthnkucuk/media-kit.git
      path: libs/windows/media_kit_libs_windows_audio
      ref: main
  media_kit_libs_macos_audio:
    git:
      url: https://github.com/bthnkucuk/media-kit.git
      path: libs/macos/media_kit_libs_macos_audio
      ref: main
  media_kit_libs_linux:
    git:
      url: https://github.com/bthnkucuk/media-kit.git
      path: libs/linux/media_kit_libs_linux
      ref: main
